document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

26;\n    --border: rgba(255,255,255,0.07);\n    --border-2: rgba(255,255,255,0.12);\n    --fg: #F0F0F5;\n    --fg-muted: #9A9AA8;\n    --fg-dim: #5A5A68;\n    --primary: #7C5CFF;\n    --primary-soft: rgba(124, 92, 255, 0.12);\n    --accent: #00E5B8;\n    --warn: #FFB547;\n    --danger: #FF5470;\n\n    --font-heading: 'Space Grotesk', sans-serif;\n    --font-body: 'Inter', sans-serif;\n    --font-mono: 'JetBrains Mono', monospace;\n    --font-serif: 'Instrument Serif', serif;\n\n    --unit: 8px;\n    --r-sm: 6px;\n    --r-md: 10px;\n    --r-lg: 16px;\n    --r-xl: 24px;\n\n    --section-pad: 96px;\n  }\n\n  [data-density=\"compact\"] {\n    --section-pad: 56px;\n    --unit: 6px;\n  }\n  [data-density=\"spacious\"] {\n    --section-pad: 140px;\n    --unit: 10px;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--bg); color: var(--fg); font-family: var(--font-body); -webkit-font-smoothing: antialiased; line-height: 1.5; }\n\n  body {\n    display: grid;\n    grid-template-columns: 240px 1fr;\n    min-height: 100vh;\n  }\n\n  /* ============ SIDEBAR ============ */\n  aside.sidenav {\n    position: sticky; top: 0;\n    height: 100vh;\n    padding: 28px 20px;\n    border-right: 1px solid var(--border);\n    background: var(--bg);\n    overflow-y: auto;\n    z-index: 10;\n  }\n  aside.sidenav .brand-mini {\n    display: flex; align-items: center; gap: 10px;\n    font-family: var(--font-heading); font-weight: 600; font-size: 18px;\n    margin-bottom: 32px;\n    letter-spacing: -0.02em;\n  }\n  .mark-glyph {\n    width: 28px; height: 28px; border-radius: 7px;\n    background: var(--primary);\n    display: grid; place-items: center;\n    position: relative;\n  }\n  .mark-glyph::before,\n  .mark-glyph::after {\n    content: '';\n    position: absolute;\n    background: var(--bg);\n  }\n  .mark-glyph::before {\n    width: 12px; height: 2px;\n    top: 10px; left: 8px;\n  }\n  .mark-glyph::after {\n    width: 8px; height: 2px;\n    top: 16px; left: 8px;\n  }\n\n  aside .nav-label {\n    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;\n    color: var(--fg-dim); margin: 24px 10px 8px;\n    font-weight: 500;\n  }\n  aside .nav-label:first-of-type { margin-top: 0; }\n  aside a.nav-link {\n    display: flex; align-items: center; gap: 10px;\n    padding: 8px 10px;\n    font-size: 13.5px; color: var(--fg-muted); text-decoration: none;\n    border-radius: 7px;\n    transition: all 0.15s ease;\n  }\n  aside a.nav-link:hover { color: var(--fg); background: var(--bg-elev); }\n  aside a.nav-link.active { color: var(--fg); background: var(--bg-elev-2); }\n  aside a.nav-link .num {\n    font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim);\n    width: 22px;\n  }\n\n  aside .side-foot {\n    position: sticky; bottom: 0; padding-top: 24px;\n    font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim);\n    line-height: 1.8;\n  }\n\n  /* ============ MAIN ============ */\n  main { padding: 0 64px 120px; max-width: 1280px; }\n  [data-density=\"compact\"] main { padding: 0 40px 80px; }\n\n  section.block {\n    padding: var(--section-pad) 0;\n    border-bottom: 1px solid var(--border);\n  }\n  section.block:last-of-type { border-bottom: none; }\n\n  .section-head {\n    display: grid; grid-template-columns: 120px 1fr; gap: 40px;\n    margin-bottom: 56px;\n    align-items: baseline;\n  }\n  .section-num {\n    font-family: var(--font-mono); font-size: 12px; color: var(--fg-dim);\n    letter-spacing: 0.04em;\n  }\n  .section-title h2 {\n    font-family: var(--font-heading); font-weight: 500;\n    font-size: 40px; letter-spacing: -0.025em; line-height: 1.05;\n    margin-bottom: 14px;\n  }\n  .section-title p {\n    color: var(--fg-muted); font-size: 16px; max-width: 580px;\n    line-height: 1.55;\n  }\n\n  /* ============ HERO ============ */\n  .hero {\n    padding: 96px 0 80px;\n    border-bottom: 1px solid var(--border);\n    position: relative;\n  }\n  .hero-meta {\n    display: flex; gap: 40px;\n    font-family: var(--font-mono); font-size: 11px; color: var(--fg-dim);\n    margin-bottom: 56px;\n    text-transform: uppercase; letter-spacing: 0.06em;\n  }\n  .hero-meta strong { color: var(--fg-muted); font-weight: 500; margin-right: 8px; }\n\n  .hero h1 {\n    font-family: var(--font-heading); font-weight: 400;\n    font-size: clamp(64px, 8vw, 120px);\n    letter-spacing: -0.045em; line-height: 0.92;\n    margin-bottom: 32px;\n  }\n  .hero h1 em {\n    font-family: var(--font-serif); font-style: italic; font-weight: 400;\n    color: var(--primary);\n  }\n  .hero .lede {\n    font-size: 20px; color: var(--fg-muted);\n    max-width: 640px; line-height: 1.45;\n  }\n  .hero .lede .accent { color: var(--fg); }\n\n  .hero-stamps {\n    margin-top: 64px;\n    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;\n    border-top: 1px solid var(--border);\n    border-bottom: 1px solid var(--border);\n  }\n  .stamp {\n    padding: 24px 20px;\n    border-right: 1px solid var(--border);\n  }\n  .stamp:last-child { border-right: none; }\n  .stamp .k {\n    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;\n    letter-spacing: 0.08em; color: var(--fg-dim); margin-bottom: 10px;\n  }\n  .stamp .v {\n    font-family: var(--font-heading); font-size: 18px; color: var(--fg);\n    letter-spacing: -0.015em;\n  }\n\n  /* ============ LOGO SHOWCASE ============ */\n  .logo-stage {\n    background: var(--bg-elev);\n    border: 1px solid var(--border);\n    border-radius: var(--r-lg);\n    padding: 96px 40px;\n    display: grid; place-items: center;\n    min-height: 360px;\n    position: relative;\n    overflow: hidden;\n  }\n  .logo-stage::before {\n    content: ''; position: absolute; inset: 0;\n    background-image:\n      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);\n    background-size: 24px 24px;\n    pointer-events: none;\n  }\n  .logo-stage .stage-label {\n    position: absolute; top: 16px; left: 20px;\n    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;\n    letter-spacing: 0.08em; color: var(--fg-dim);\n  }\n  .logo-stage .stage-label.right { left: auto; right: 20px; }\n\n  /* ------- LOGO MARK A: CAPSULE ------- */\n  .mark-capsule {\n    width: 64px; height: 64px; border-radius: 16px;\n    background: var(--primary);\n    display: grid; place-items: center;\n    position: relative;\n    flex-shrink: 0;\n  }\n  .mark-capsule .c-line {\n    position: absolute; background: var(--bg);\n    border-radius: 2px;\n  }\n  .mark-capsule .l1 { width: 26px; height: 3px; top: 22px; left: 18px; }\n  .mark-capsule .l2 { width: 18px; height: 3px; top: 32px; left: 18px; }\n  .mark-capsule .l3 { width: 10px; height: 3px; top: 42px; left: 18px; }\n\n  .wordmark {\n    font-family: var(--font-heading);\n    font-weight: 500;\n    font-size: 72px;\n    letter-spacing: -0.04em;\n    color: var(--fg);\n    display: flex; align-items: center; gap: 20px;\n  }\n  .wordmark .dot-mark {\n    width: 14px; height: 14px; border-radius: 50%;\n    background: var(--primary);\n  }\n\n  .logo-lockup-primary {\n    display: flex; align-items: center; gap: 24px;\n  }\n  .logo-lockup-primary .word {\n    font-family: var(--font-heading);\n    font-weight: 500;\n    font-size: 80px;\n    letter-spacing: -0.045em;\n    color: var(--fg);\n  }\n\n  /* ------- LOGO MARK B: TICKET NOTCH ------- */\n  .mark-ticket {\n    width: 76px; height: 56px;\n    background: var(--primary);\n    border-radius: 10px;\n    position: relative;\n    display: grid; place-items: center;\n  }\n  .mark-ticket::before,\n  .mark-ticket::after {\n    content: ''; position: absolute;\n    width: 14px; height: 14px; border-radius: 50%;\n    background: var(--bg-elev);\n    top: 50%; transform: translateY(-50%);\n  }\n  .mark-ticket::before { left: -7px; }\n  .mark-ticket::after { right: -7px; }\n  .mark- 0 65 L270 50 L300 55 L330 40 L360 45 L390 35 L420 50 L450 30 L480 40 L510 25 L540 35 L570 20 L600 30\" fill=\"none\" stroke=\"#7C5CFF\" stroke-width=\"2\"><\u002Fpath>\n            <circle cx=\"570\" cy=\"20\" r=\"4\" fill=\"#00E5B8\"><\u002Fcircle>\n            <circle cx=\"570\" cy=\"20\" r=\"8\" fill=\"#00E5B8\" opacity=\"0.3\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"table-events\">\n          <div class=\"te-head\">\n            <div>Evento<\u002Fdiv>\n            <div>Data<\u002Fdiv>\n            <div>Vendas<\u002Fdiv>\n            <div>Receita<\u002Fdiv>\n            <div>Status<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"te-row\">\n            <div class=\"name\"><span class=\"d live\"><\u002Fspan>Noite de Estreia<\u002Fdiv>\n            <div class=\"date\">18.05 · 20:30<\u002Fdiv>\n            <div><div class=\"progress\" style=\"--pct: 87%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"money\">R$ 156K<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--danger);\">AO VIVO<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"te-row\">\n            <div class=\"name\"><span class=\"d\"><\u002Fspan>TechConf Brasil 2026<\u002Fdiv>\n            <div class=\"date\">22.05 · 09:00<\u002Fdiv>\n            <div><div class=\"progress\" style=\"--pct: 64%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"money\">R$ 412K<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--accent);\">ATIVO<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"te-row\">\n            <div class=\"name\"><span class=\"d\"><\u002Fspan>Clássico Regional<\u002Fdiv>\n            <div class=\"date\">02.06 · 16:00<\u002Fdiv>\n            <div><div class=\"progress\" style=\"--pct: 42%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"money\">R$ 198K<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--accent);\">ATIVO<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"te-row\">\n            <div class=\"name\"><span class=\"d draft\"><\u002Fspan>Festival Inverno<\u002Fdiv>\n            <div class=\"date\">15.06 · 18:00<\u002Fdiv>\n            <div><div class=\"progress\" style=\"--pct: 8%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"money\">R$ 22K<\u002Fdiv>\n            <div style=\"font-family: var(--font-mono); font-size: 10px; color: var(--fg-dim);\">RASCUNHO<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TOM DE VOZ -->\n<section class=\"block\" id=\"voz\">\n  <div class=\"section-head\">\n    <div class=\"section-num\">11 / VOZ<\u002Fdiv>\n    <div class=\"section-title\">\n      <h2>Tom de voz<\u002Fh2>\n      <p>Direto, sem pompa. A eevex fala como um amigo que entende de produto — te explica o necessário, não mais que isso. Nunca exagera, nunca se desculpa à toa, nunca grita.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"voice-grid\">\n    <div class=\"voice-card\">\n      <h4><span class=\"icon\">✓<\u002Fspan>Somos<\u002Fh4>\n      <ul>\n        <li><b>Diretos.<\u002Fb> Frases curtas. Verbo no início. \"Compre agora\", não \"Você pode comprar agora\".<\u002Fli>\n        <li><b>Precisos.<\u002Fb> \"18 mai, 20:30\" e não \"próxima sexta à noite\". Datas e números sem ambiguidade.<\u002Fli>\n        <li><b>Humanos.<\u002Fb> Erramos? Dizemos. \"Não conseguimos processar agora. Tente de novo em 1 min.\" — não \"Ops!\"<\u002Fli>\n        <li><b>Minúsculos.<\u002Fb> O nome é <em>eevex<\u002Fem>, sempre. Em qualquer posição da frase.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"voice-card\">\n      <h4 class=\"bad\"><span class=\"icon\">✕<\u002Fspan>Não somos<\u002Fh4>\n      <ul>\n        <li><b>Exagerados.<\u002Fb> Nada de \"A melhor experiência de eventos do universo!\"<\u002Fli>\n        <li><b>Fofinhos.<\u002Fb> Sem emojis no produto. Sem \"😊\" em notificações.<\u002Fli>\n        <li><b>Corporativos.<\u002Fb> Sem \"otimize sua jornada de engajamento\". Isso não significa nada.<\u002Fli>\n        <li><b>Vagos.<\u002Fb> \"Em breve\" é fraco. \"Quinta, 23 mai\" é forte.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"voice-pairs\">\n    <div class=\"vp-cell head\">Evite<\u002Fdiv>\n    <div class=\"vp-cell head\">Prefira<\u002Fdiv>\n\n    <div class=\"vp-cell no\">Ops! Algo deu errado 😔 Tente novamente mais tarde.<\u002Fdiv>\n    <div class=\"vp-cell yes\">Pagamento não aprovado. Verifique o cartão e tente de novo.<\u002Fdiv>\n\n    <div class=\"vp-cell no\">Garanta já seu ingresso antes que acabe!!!<\u002Fdiv>\n    <div class=\"vp-cell yes\">Restam 23 ingressos para a Pista A.<\u002Fdiv>\n\n    <div class=\"vp-cell no\">Bem-vindo(a) à sua plataforma de eventos favorita!<\u002Fdiv>\n    <div class=\"vp-cell yes\">Oi. Procurando algo para essa semana?<\u002Fdiv>\n\n    <div class=\"vp-cell no\">Seu pedido está sendo processado...<\u002Fdiv>\n    <div class=\"vp-cell yes\">Processando pagamento. Isso leva até 30 segundos.<\u002Fdiv>\n\n    <div class=\"vp-cell no\">Você está a um passo da melhor noite da sua vida!<\u002Fdiv>\n    <div class=\"vp-cell yes\">Compra confirmada. O ingresso já está na sua carteira.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOT -->\n<section class=\"foot-block\">\n  <div>\n    eevex · sistema de marca v1.0<br>\n    última atualização: 2026.04.20\n  <\u002Fdiv>\n  <div class=\"sig\">— fim do documento<\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============== SIMPLIFIED TICKET-NOTCH OVERRIDE ============== -->\n<style>\n/* ============================================================\n   FINAL SYMBOL — SIMPLIFIED TICKET-NOTCH\n   Single geometric primitive: rounded rectangle + 2 side notches.\n   Scales from any size; no internal detail; easy to reproduce\n   in vector, embroidery, favicon, etc.\n   ============================================================ */\n\n/* Reset all previous mark implementations */\n.mark-glyph,\n.mark-capsule,\n.mark-ticket,\n.mark-mono,\n.ff-mark,\n.motion-logo .mark {\n  all: unset;\n  display: inline-block;\n  flex-shrink: 0;\n  position: relative;\n  background: var(--primary);\n  border-radius: 22%;\n  width: 28px; height: 20px;\n  -webkit-mask:\n    radial-gradient(circle at 0% 50%, transparent 11%, #000 12%),\n    radial-gradient(circle at 100% 50%, transparent 11%, #000 12%);\n  -webkit-mask-composite: source-in;\n          mask:\n    radial-gradient(circle at 0% 50%, transparent 11%, #000 12%),\n    radial-gradient(circle at 100% 50%, transparent 11%, #000 12%);\n          mask-composite: intersect;\n}\n/* Reset all inner pseudo elements and children */\n.mark-glyph::before, .mark-glyph::after,\n.mark-capsule::before, .mark-capsule::after,\n.mark-ticket::before, .mark-ticket::after,\n.mark-mono::before, .mark-mono::after,\n.ff-mark::before, .ff-mark::after,\n.motion-logo .mark::before,\n.motion-logo .mark::after { content: none !important; display: none !important; }\n\n.mark-capsule .c-line,\n.mark-ticket .barcode,\n.motion-logo .mark .l3 { display: none !important; }\n\n/* === SIZES by context === */\n/* Sidebar */\naside.sidenav .mark-glyph { width: 28px; height: 20px; border-radius: 22%; }\n\n/* Main lockup — pair mark height to lowercase 'eevex' x-height */\n.logo-lockup-primary .mark-capsule { width: 76px; height: 54px; border-radius: 22%; }\n/* Size demo row — inherit transform from parent */\n.size-item .mark-capsule { width: 76px; height: 54px; border-radius: 22%; }\n\n/* Variations cards: only the ticket variant matters now — ensure uniform look */\n.variant-card .mark-capsule,\n.variant-card .mark-ticket,\n.variant-card .mark-mono { width: 58px; height: 42px; border-radius: 22%; }\n\n/* Favicon cell (big square) */\n.variant-card:last-child .mark-capsule { width: 96px; height: 68px; border-radius: 22%; }\n\n/* Light mode variant */\n.variant-card.light .mark-capsule { background: #1A1A22 !important; }\n/* Accent bg variant */\n.variant-card.accent-bg .mark-capsule { background: #0A0A0F !important; }\n\n/* Ingresso top bar — still gradient, keeps signature */\n/* Ticket digital inside ingresso section uses its own .ticket markup — left as is */\n\n/* App brand dot stays untouched (it's just a color dot, not the mark) */\n\n/* Motion */\n.motion-logo .mark { width: 88px; height: 62px; border-radius: 22%; }\n.motion-sequence .ff-mark { width: 52px; height: 36px; border-radius: 22%; }\n\n/* === Hide capsule & mono variants in the Variations grid,\n      promote ticket-notch as the single symbol.\n      Grid children (order in source):\n      1 capsule-dark  2 ticket-dark  3 mono-dark\n      4 capsule-light 5 accent-bg    6 favicon(capsule)\n      Keep: 2 (ticket), 5 (accent), 6 (favicon, re-rendered as notch) === */\n.logo-variants > .variant-card:nth-child(1),\n.logo-variants > .variant-card:nth-child(3),\n.logo-variants > .variant-card:nth-child(4) {\n  display: none !important;\n}\n\n/* Re-layout remaining 3 cards in a clean row */\n.logo-variants {\n  grid-template-columns: repeat(3, 1fr) !important;\n}\n\n/* Clean up inline pseudo lines of old mark-capsule inside cards (already reset via :unset) */\n.variant-card .logo-lockup-primary,\n.variant-card > .variant-slot > div { gap: 18px !important; }\n\n/* Motion sequence frames: progressive fade-in of the mark only */\n.motion-sequence .frame > span { display: none !important; }\n\n/* Frame 1: dim. Frame 2: 60%. Frame 3: full. Frame 4: 70% + shift. Frame 5: dim (loop) */\n.motion-sequence .frame:nth-child(1) .ff-mark { opacity: 0.25 !important; }\n.motion-sequence .frame:nth-child(2) .ff-mark { opacity: 0.6 !important; }\n.motion-sequence .frame:nth-child(3) .ff-mark { opacity: 1 !important; }\n.motion-sequence .frame:nth-child(4) .ff-mark { opacity: 0.7 !important; transform: translateX(4px); }\n.motion-sequence .frame:nth-child(5) .ff-mark { opacity: 0.25 !important; }\n\n/* Update motion animation: a subtle pulse on the notch mark */\n@keyframes evx-notch-pulse {\n  0%, 100% { transform: scale(1); opacity: 1; }\n  50% { transform: scale(0.92); opacity: 0.75; }\n}\n.motion-logo .mark { animation: evx-notch-pulse 2.4s ease-in-out infinite !important; }\n\n/* Section 01 description adjust via content already generic enough — leave copy alone */\n<\u002Fstyle>\n\n<!-- ============== TWEAKS PANEL ============== -->\n<div class=\"tweaks-panel\" id=\"tweaks\">\n  <h3>Tweaks<\u002Fh3>\n  <div class=\"tp-sub\">ajustes ao vivo<\u002Fdiv>\n\n  <div class=\"tp-group\">\n    <div class=\"tp-label\">Cor primária<\u002Fdiv>\n    <div class=\"tp-colors\">\n      <div class=\"tp-swatch active\" data-color=\"#7C5CFF\" style=\"background: #7C5CFF;\"><\u002Fdiv>\n      <div class=\"tp-swatch\" data-color=\"#FF5470\" style=\"background: #FF5470;\"><\u002Fdiv>\n      <div class=\"tp-swatch\" data-color=\"#FF8A3D\" style=\"background: #FF8A3D;\"><\u002Fdiv>\n      <div class=\"tp-swatch\" data-color=\"#00E5B8\" style=\"background: #00E5B8;\"><\u002Fdiv>\n      <div class=\"tp-swatch\" data-color=\"#3D8BFF\" style=\"background: #3D8BFF;\"><\u002Fdiv>\n      <div class=\"tp-swatch\" data-color=\"#F0F0F5\" style=\"background: #F0F0F5;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tp-group\">\n    <div class=\"tp-label\">Tipografia display<\u002Fdiv>\n    <div class=\"tp-select\">\n      <div class=\"tp-chip active\" data-font=\"Space Grotesk\">Space Grotesk<\u002Fdiv>\n      <div class=\"tp-chip\" data-font=\"Inter\">Inter<\u002Fdiv>\n      <div class=\"tp-chip\" data-font=\"General Sans\">General Sans<\u002Fdiv>\n      <div class=\"tp-chip\" data-font=\"Instrument Serif\">Instrument Serif<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tp-group\">\n    <div class=\"tp-label\">Densidade<\u002Fdiv>\n    <div class=\"tp-select\">\n      <div class=\"tp-chip\" data-density=\"compact\">Compact<\u002Fdiv>\n      <div class=\"tp-chip active\" data-density=\"comfortable\">Comfortable<\u002Fdiv>\n      <div class=\"tp-chip\" data-density=\"spacious\">Spacious<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"tp-group\">\n    <div class=\"tp-label\">Logo variant ativo<\u002Fdiv>\n    <div class=\"tp-select\">\n      <div class=\"tp-chip active\" data-logo=\"all\">Todas (3)<\u002Fdiv>\n      <div class=\"tp-chip\" data-logo=\"capsule\">Cápsula<\u002Fdiv>\n      <div class=\"tp-chip\" data-logo=\"ticket\">Ticket<\u002Fdiv>\n      <div class=\"tp-chip\" data-logo=\"mono\">Monograma<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // Navigation active state\n  const navLinks = document.querySelectorAll('aside a.nav-link');\n  const sections = [...document.querySelectorAll('main section[id]')];\n\n  function updateActive() {\n    const scrollPos = window.scrollY + 180;\n    let current = sections[0]?.id;\n    for (const s of sections) {\n      if (s.offsetTop <= scrollPos) current = s.id;\n    }\n    navLinks.forEach(a => {\n      a.classList.toggle('active', a.getAttribute('href') === '#' + current);\n    });\n  }\n  window.addEventListener('scroll', updateActive, { passive: true });\n  updateActive();\n\n  // ===== Tweak mode integration =====\n  const tweaksPanel = document.getElementById('tweaks');\n  let state = { ...TWEAK_DEFAULTS };\n\n  function applyState() {\n    document.documentElement.style.setProperty('--primary', state.primaryColor);\n    document.documentElement.style.setProperty('--primary-soft', state.primaryColor + '1f');\n    document.documentElement.style.setProperty('--font-heading', `'${state.fontHeading}', sans-serif`);\n    document.documentElement.style.setProperty('--font-body', `'${state.fontBody}', sans-serif`);\n    document.body.setAttribute('data-density', state.density);\n    document.body.setAttribute('data-logo-variant', state.logoVariant);\n\n    // update active UI in panel\n    document.querySelectorAll('.tp-swatch').forEach(el => {\n      el.classList.toggle('active', el.dataset.color === state.primaryColor);\n    });\n    document.querySelectorAll('.tp-chip[data-font]').forEach(el => {\n      el.classList.toggle('active', el.dataset.font === state.fontHeading);\n    });\n    document.querySelectorAll('.tp-chip[data-density]').forEach(el => {\n      el.classList.toggle('active', el.dataset.density === state.density);\n    });\n    document.querySelectorAll('.tp-chip[data-logo]').forEach(el => {\n      el.classList.toggle('active', el.dataset.logo === state.logoVariant);\n    });\n  }\n  applyState();\n\n  // Panel listeners\n  document.querySelectorAll('.tp-swatch').forEach(el => {\n    el.addEventListener('click', () => {\n      state.primaryColor = el.dataset.color;\n      applyState();\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { primaryColor: state.primaryColor } }, '*');\n    });\n  });\n  document.querySelectorAll('.tp-chip[data-font]').forEach(el => {\n    el.addEventListener('click', () => {\n      state.fontHeading = el.dataset.font;\n      applyState();\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { fontHeading: state.fontHeading } }, '*');\n    });\n  });\n  document.querySelectorAll('.tp-chip[data-density]').forEach(el => {\n    el.addEventListener('click', () => {\n      state.density = el.dataset.density;\n      applyState();\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density: state.density } }, '*');\n    });\n  });\n  document.querySelectorAll('.tp-chip[data-logo]').forEach(el => {\n    el.addEventListener('click', () => {\n      state.logoVariant = el.dataset.logo;\n      applyState();\n      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { logoVariant: state.logoVariant } }, '*');\n    });\n  });\n\n  // Edit mode host hooks\n  window.addEventListener('message', (e) => {\n    if (!e.data || !e.data.type) return;\n    if (e.data.type === '__activate_edit_mode') tweaksPanel.classList.add('active');\n    if (e.data.type === '__deactivate_edit_mode') tweaksPanel.classList.remove('active');\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
